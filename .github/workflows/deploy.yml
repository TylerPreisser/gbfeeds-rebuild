name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deploys — a newer run cancels the in-flight one.
# Exception: production deploys on main are queued, not cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────
  # Gate 1 (parallel): lint + type-check + unit tests
  # ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run type-check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest unit tests
        run: npm run test:unit

  # ──────────────────────────────────────────────────
  # Gate 2: Build (depends on all Gate 1 jobs)
  # ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-unit]

    env:
      # Build-time public env vars — pulled from GitHub repo Secrets.
      # Source of truth for prod values = CF Pages dashboard env vars.
      # These are duplicated here ONLY for CI build + E2E test fidelity.
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_FORM_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FORM_ENDPOINT }}
      NEXT_PUBLIC_TRUSTEDSITE_ID: ${{ secrets.NEXT_PUBLIC_TRUSTEDSITE_ID }}
      NEXT_PUBLIC_FEATURE_FIELD_CLUB: ${{ secrets.NEXT_PUBLIC_FEATURE_FIELD_CLUB }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: 'npm'

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Cache key scoped to Node version + package-lock hash.
          # A lockfile change busts the cache intentionally.
          key: nextjs-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-node20-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Upload out/ artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-out
          path: out/
          # 1-day retention — consumed by downstream jobs only, not archived.
          retention-days: 1

  # ──────────────────────────────────────────────────
  # Gate 3 (parallel): E2E + Lighthouse
  # Both depend on build; both consume the out/ artifact.
  # ──────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download out/ artifact
        uses: actions/download-artifact@v4
        with:
          name: next-out
          path: out/

      - name: Install Playwright browsers (Chromium only — CI speed)
        run: npx playwright install --with-deps chromium

      - name: Serve out/ and run E2E tests
        run: |
          npx serve out -p 4173 --no-clipboard &
          SERVE_PID=$!
          # Wait for server to be ready
          npx wait-on http://localhost:4173 --timeout 30000
          npm run test:e2e
          kill $SERVE_PID

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli

      - name: Download out/ artifact
        uses: actions/download-artifact@v4
        with:
          name: next-out
          path: out/

      - name: Serve out/ for Lighthouse
        run: npx serve out -p 4173 --no-clipboard &

      - name: Wait for server
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Run Lighthouse CI
        run: lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7

  # ──────────────────────────────────────────────────
  # Gate 4: Deploy to Cloudflare Pages
  # Only runs on main branch push (not PRs).
  # ──────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [test-e2e, lighthouse]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Download out/ artifact
        uses: actions/download-artifact@v4
        with:
          name: next-out
          path: out/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=gbfeeds-rebuild
